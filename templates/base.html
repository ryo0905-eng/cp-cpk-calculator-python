<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }}</title>
    <meta name="description" content="{{ meta_description }}">
    <link rel="canonical" href="{{ canonical_url }}">
    <meta property="og:title" content="{{ page_title }}">
    <meta property="og:description" content="{{ meta_description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ canonical_url }}">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-71Y5PVPJTR"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() {dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-71Y5PVPJTR');

        function trackOutboundClick(eventName, linkUrl) {
            gtag('event', eventName, {
                event_category: 'engagement',
                event_label: linkUrl,
                link_url: linkUrl,
            });
        }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v=config['STATIC_ASSET_VERSION']) }}">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="container nav-shell">
            <a class="brand" href="{{ url_for('index') }}">Cp / Cpk Calculator</a>
            <div class="nav-actions">
                <nav class="site-nav">
                    <a href="{{ url_for('index') }}">Calculator</a>
                    <a href="{{ url_for('content_page', slug='cp-vs-cpk') }}">Cp vs Cpk</a>
                    <a href="{{ url_for('content_page', slug='what-is-pp-ppk') }}">Pp / Ppk</a>
                    <a href="{{ url_for('content_page', slug='what-is-a-good-cpk-value') }}">Good Cpk Value</a>
                </nav>
                <a class="github-link" href="https://github.com/ryo0905-eng/cp-cpk-calculator-python" target="_blank" rel="noopener noreferrer" onclick="trackOutboundClick('click_github_header', this.href)">
                    <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                        <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49C3.78 14.2 3.31 12.77 3.31 12.77c-.36-.92-.88-1.16-.88-1.16-.72-.49.05-.48.05-.48.8.06 1.22.82 1.22.82.71 1.22 1.87.87 2.33.67.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.58.82-2.14-.08-.2-.36-1.01.08-2.1 0 0 .67-.21 2.2.82A7.6 7.6 0 0 1 8 4.85c.68 0 1.37.09 2.01.27 1.53-1.03 2.2-.82 2.2-.82.44 1.09.16 1.9.08 2.1.51.56.82 1.27.82 2.14 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.19 0 .21.14.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
                    </svg>
                    <span>GitHub</span>
                </a>
            </div>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container support-strip">
            <div class="support-copy">
                <h2>Support this tool</h2>
                <p>If this calculator saves you time, feedback and support help me keep improving it.</p>
            </div>
            <div class="support-actions">
                <a class="button button-secondary" href="https://forms.gle/2sQdwEbdmH4JPKjD7" target="_blank" rel="noopener noreferrer" onclick="trackOutboundClick('click_feedback', this.href)">Give feedback</a>
                <script
                    type="text/javascript"
                    src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js"
                    data-name="bmc-button"
                    data-slug="ryo.aihub"
                    data-color="#FFDD00"
                    data-emoji=""
                    data-font="Cookie"
                    data-text="Buy me a coffee"
                    data-outline-color="#000000"
                    data-font-color="#000000"
                    data-coffee-color="#ffffff"
                ></script>
                <a class="footer-text-link" href="https://buymeacoffee.com/ryo.aihub" target="_blank" rel="noopener noreferrer" onclick="trackOutboundClick('click_buy_me_a_coffee', this.href)">Support via Buy Me a Coffee</a>
            </div>
        </div>
    </footer>
</body>
</html>
